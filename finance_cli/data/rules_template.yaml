# ── Rules Template ──────────────────────────────────────────────────
# Copied to each new user on first login.  Users can then customise
# their own copy via the CLI or web UI.
#
# Sections marked "user-specific" are left empty here; users populate
# them with their own vendors, income sources, and split ratios.
# ────────────────────────────────────────────────────────────────────

keyword_rules:
# Software & Subscriptions — widely recognised SaaS vendors
- keywords:
  - ZOOM
  - NOTION
  - CHATGPT
  - OPENAI
  - CANVA
  - GOOGLE
  - GSUITE
  - MICROSOFT
  - ADOBE
  - AMAZON WEB SERVICES
  - AWS
  - APPLE.COM/BILL
  - APPLE.COM
  - LASTPASS.COM
  - SPOTIFY
  - NETFLIX
  - DROPBOX
  - SLACK
  - GITHUB
  - HEROKU
  - DIGITALOCEAN
  - VERCEL
  category: Software & Subscriptions
  use_type: Business
  priority: 0

# Bank Charges & Fees — standard fee descriptors
- keywords:
  - PLAN FEE
  - ANNUAL FEE
  - ANNUAL MEMBERSHIP FEE
  - INTEREST CHARGE
  - INTEREST CHARGED
  - TOTAL INTEREST CHARGE
  - PURCHASE INTEREST CHARGE
  category: Bank Charges & Fees
  use_type: Personal
  priority: 10

# Transportation
- keywords:
  - UBER
  - LYFT
  category: Transportation
  use_type: Personal
  priority: 0

# Coffee
- keywords:
  - STARBUCKS
  category: Coffee
  use_type: Personal
  priority: 0

# Income: Salary
- keywords:
  - DIRECT DEPOSIT
  - PAYROLL
  - PAYCHECK
  - SALARY
  category: 'Income: Salary'
  use_type: Personal
  priority: 0

# ── Revenue streams (user-specific) ────────────────────────────────
revenue_streams: []

# ── Payment keywords — standard US bank payment descriptors ────────
payment_keywords:
- CREDIT CARD BILL PAYMENT
- CREDIT CRD
- AMERICAN EXPRESS DES:ACH PMT
- APPLECARD GSBANK
- CITI CARD ONLINE
- CITI AUTOPAY
- CREDIT ONE-TIME PAYMENT
- BARCLAYCARD US DES:CREDITCARD
- PAYPAL DES:INST XFER
- ONLINE BANKING TRANSFER
- ONLINE SCHEDULED TRANSFER
- VENMO REPAYMENT
- PAYMENT - THANK
- AUTOPAY PAYMENT
- AUTO PYMT
- AUTO PMT
- AUTOMATIC PAYMENT - THANK
- ONLINE PAYMENT - THANK
- PAYMENT THANK YOU

# ── Payment exclusions ─────────────────────────────────────────────
payment_exclusions:
- 'Check '

# ── Category aliases — map Plaid / bank source categories to canonical names
category_aliases:
  "Restaurant-Bar & Caf\xE9": Dining
  Restaurant-Bar & Cafe: Dining
  Restaurant-Restaurant: Dining
  Merchandise & Supplies-Groceries: Groceries
  Merchandise & Supplies-General Retail: Shopping
  Merchandise & Supplies-Computer Supplies: Shopping
  Merchandise & Supplies-Internet Purchase: Shopping
  Merchandise & Supplies-Mail Order: Shopping
  Merchandise & Supplies-Hardware Supplies: Shopping
  Merchandise & Supplies-Pharmacies: Shopping
  Merchandise & Supplies-Wholesale Stores: Shopping
  Fees & Adjustments-Fees & Adjustments: Bank Charges & Fees
  Fees & Adjustments: Bank Charges & Fees
  Transportation-Taxis & Coach: Transportation
  Transportation-Rail Services: Transportation
  Transportation-Parking Charges: Transportation
  Transportation-Tolls & Fees: Transportation
  Transportation-Fuel: Transportation
  Travel-Airline: Travel
  Travel-Lodging: Travel
  Travel-Travel Agencies: Travel
  Travel-Vehicle Rental: Travel
  Entertainment-Associations: Entertainment
  Entertainment-General Events: Entertainment
  Entertainment-Theatrical Events: Entertainment
  Entertainment-Other Entertainment: Entertainment
  Business Services-Other Services: Professional Fees
  Business Services-Conferences & Training: Professional Fees
  Business Services-Office Supplies: Professional Fees
  Business Services-Employment Agencies: Professional Fees
  Business Services-Advertising Services: Professional Fees
  Business Services-Health Care Services: Health & Wellness
  Govt-services-parking: Donations
  Bills & Utilities: Bank Charges & Fees
  Restaurants: Dining
  Food & Drink: Dining
  Grocery: Groceries
  Airlines: Travel
  Interest: Bank Charges & Fees
  Professional Services: Professional Fees
  Personal: Personal Expense
  Credit: 'Income: Other'
  Debit: 'Income: Other'
  Payment: null
  Other-Miscellaneous: null
  Other: null
  Gas: Transportation
  Education: Professional Fees
  Education & Training: Professional Fees
  Computer - Software: Software & Subscriptions
  Subscriptions & Dues: Software & Subscriptions

# ── Split rules (user-specific) ───────────────────────────────────
split_rules: []

# ── Category overrides ─────────────────────────────────────────────
category_overrides:
- categories:
  - 'Income: Business'
  - Cost of Goods Sold
  - Advertising
  - Contract Labor
  force_use_type: Business
  note: 'Hard override: always business'
- categories:
  - Childcare
  - Donations
  - Health & Wellness
  - Groceries
  force_use_type: Personal
  note: 'Hard override: always personal'
- categories:
  - Coffee
  - Dining
  - Entertainment
  - Personal Expense
  - Shopping
  force_use_type: Personal
  soft_default: true
  note: 'Soft default: personal by default, but reviewable per transaction'

# ── Income sources (user-specific) ─────────────────────────────────
income_sources: {}

# ── AI config ──────────────────────────────────────────────────────
ai_parser:
  provider: openai
  model: gpt-4.1
  max_text_chars: 100000
  confidence_warn: 0.8
  confidence_block: 0.6

ai_categorizer:
  provider: openai
  model: gpt-4.1
  batch_size: 50
  auto_remember: true
  auto_remember_confirmed: false
  confidence: 0.7

# ── Essential categories — used for budget/debt analysis ───────────
essential_categories:
- Utilities
- Insurance
- Health & Wellness
- Rent
- Housing
- Childcare
